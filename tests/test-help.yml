name: Test firebase help
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          args: help
        env:
          FIREBASE_TOKEN: fake-token-for-help-check
      - name: Assert action succeeded
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected action to succeed when running firebase help, but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: firebase help ran successfully"
