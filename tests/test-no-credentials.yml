name: Test no credentials error
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          args: --version
        continue-on-error: true

      - name: Assert action failed due to missing credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when no credentials are provided, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no credentials were provided"
