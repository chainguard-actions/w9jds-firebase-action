name: Test basic firebase-action usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: firebase
        uses: .
        env:
          FIREBASE_TOKEN: "fake-token-for-version-check"
          args: --version
      - name: Assert action completed without error
        run: |
          echo "Firebase action step completed successfully"
          echo "PASS"
