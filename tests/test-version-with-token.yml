name: Test firebase --version with FIREBASE_TOKEN set
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FIREBASE_TOKEN: "fake-token-for-version-check"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run firebase --version
        id: action
        uses: .
        with:
          args: --version
      - name: Assert action succeeded
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected action to succeed when running firebase --version with FIREBASE_TOKEN set"
            exit 1
          fi
          echo "PASS: action succeeded with FIREBASE_TOKEN set and --version command"
