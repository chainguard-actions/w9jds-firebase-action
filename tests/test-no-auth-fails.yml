name: Test no-auth fails with exit 126
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action without auth and expect failure
        id: action
        uses: .
        with:
          args: --version
        continue-on-error: true
      - name: Assert action failed
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when no auth env vars are set, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no auth credentials were provided"
