    description: "Response from the firebase command executed"

runs:
  using: "docker"
  image: "docker://w9jds/firebase-action@sha256:1740d8dd69a10be1a7fe332332a9105063e2eb3c2e1a717d12a22327832dc69e" # v15.22.4
